course:
  id: "AI-109"
  title: "AIプレゼン&資料作成"
  subtitle: "クライアント提案を加速する"
  level: "実践"
  target: "全社員"
  duration: "各10分"
  category: "AI研修"

chapters:
  # ============================================================
  # Part 1: なぜAIで資料を作るのか（11分）
  # ============================================================
  - id: "Lec9-1"
    title: "なぜAIで資料を作るのか — PowerPointとの決定的な違い"
    learning_goals:
      - "従来の資料作成にかかる時間と課題を理解できる"
      - "AI活用で90%の時間削減が可能なことを説明できる"
      - "「作業」から「思考」へのシフトを理解できる"

    slides:
      - type: "title"
        title: "なぜAIで資料を作るのか"
        subtitle: "PowerPointとの決定的な違い"

      - type: "goals"
        title: "今日のゴール"
        items:
          - "従来の資料作成にかかる時間と課題を理解する"
          - "AI活用による90%の時間削減を体感する"
          - "「作業」から「思考」へのシフトを理解する"

      - type: "definition"
        title: "資料作成の現実"
        definition: "提案資料1本に3〜5時間。その大半はデザイン調整に費やされている。"
        comparison:
          left: { label: "時間の使い方", steps: ["内容を考える: 1〜2時間", "デザイン調整: 2〜3時間", "修正対応: 1時間"] }
          right: { label: "本来あるべき姿", steps: ["戦略を練る: 3時間", "ストーリーを作る: 1時間", "仕上げ: 30分"] }
        footnote: "デザインに時間を取られ、本質（何を伝えるか）を考える時間が不足している。"

      - type: "cards"
        title: "従来のワークフロー：5つのステップ"
        cards:
          - { icon: "clipboard", label: "構成を考える", desc: "何をどの順番で", color: "accent" }
          - { icon: "desktop", label: "テンプレ選択", desc: "デザインの土台探し", color: "accent" }
          - { icon: "pencil", label: "内容を書く", desc: "テキスト入力", color: "accent" }

      - type: "examples"
        title: "従来のワークフロー（続き）"
        subtitle: "デザイン調整と修正が最も時間を消費する"
        examples:
          - { label: "デザイン調整", desc: "色・フォント・図形の配置を何度も繰り返す（最も時間がかかる）" }
          - { label: "修正対応", desc: "フィードバックのたびにデザインを再調整する" }
          - { label: "合計所要時間", desc: "3〜5時間。場合によっては丸一日かかることも" }
        insight: "5つのステップを何度も行ったり来たりして、ようやく1本完成する"

      - type: "examples"
        title: "AIを活用した新しいワークフロー"
        number: 1
        subtitle: "やることは基本的に1つ — テーマと要件をAIに伝えるだけ"
        flow: ["テーマを伝える", "構成自動生成", "デザイン自動", "完成"]
        examples:
          - { label: "構成", desc: "AIが最適なスライド構成を自動で提案" }
          - { label: "デザイン", desc: "プロ品質のレイアウト・配色・画像が自動で適用" }
          - { label: "所要時間", desc: "10〜20分。従来の10分の1以下" }
        insight: "従来の5ステップが実質1ステップに集約される"

      - type: "table"
        title: "Before / After 比較"
        headers: ["", "PowerPoint", "AI（Gamma）"]
        header_colors: ["offWhite", "red", "accent"]
        rows:
          - ["作成時間", "3〜5時間", "10〜20分"]
          - ["デザイン", "テンプレート依存", "プロ品質を自動生成"]
          - ["共有方法", "ファイル添付", "URL共有"]
          - ["修正作業", "手動で再編集", "プロンプトで即修正"]

      - type: "grid"
        title: "「作業」から「思考」へシフトする"
        items:
          - { icon: "robot", label: "AIがやること", desc: "レイアウト、配色、画像選定、テンプレート作業" }
          - { icon: "brain", label: "人間がやること", desc: "何を伝えるか、どう伝えるか、提案の本質・戦略" }
          - { icon: "chart", label: "年間300時間削減", desc: "月30時間→3時間。約40営業日分を高付加価値業務へ" }
          - { icon: "target", label: "成果の質が変わる", desc: "デザイン力ではなく「伝える力」が武器になる時代" }
        key_message: "PowerPointのスキルではなく、伝える力が武器になる時代"

      - type: "summary"
        title: "Part 1 まとめ"
        items:
          - { label: "現状", text: "提案資料1本に3〜5時間。大半がデザイン作業", color: "red" }
          - { label: "AI活用", text: "10〜20分で完成。90%の時間削減", color: "accent" }
          - { label: "本質", text: "作業→思考へシフト。伝える力が武器になる", color: "green" }

      - type: "end"
        test_count: 0
        next: "Lec9-2 Gammaの基本"

    narrations:
      1: "皆さん、こんにちは。この講座では、AIを使ったプレゼン資料作成について学んでいきます。テーマは「なぜAIで資料を作るのか」です。皆さんは普段、提案資料や報告書をどのように作っていますか？おそらく多くの方がPowerPointを開いて、構成を考え、テンプレートを選び、内容を書き、デザインを調整し、何度も修正を繰り返しているのではないでしょうか。私も以前はそうでした。提案資料を1つ作るだけで、半日が潰れてしまうことも珍しくありませんでした。しかし、AIツールの進化によって、この状況が劇的に変わりつつあります。この講座を終える頃には、資料作成にかかる時間を大幅に削減し、かつ品質も向上させる方法を身につけていただけます。それでは始めていきましょう。"
      2: "今日のゴールは3つです。1つ目、従来の資料作成にかかる時間と課題を理解すること。2つ目、AIを活用することで約90パーセントの時間削減が可能であることを体感すること。3つ目、資料作成という仕事が「作業」から「思考」へシフトすることを理解すること。この3つを押さえれば、AI資料作成の基本的な価値がわかります。"
      3: "まず、資料作成の現実を見てみましょう。ビジネスパーソンが提案資料を1本作るのに、平均で3時間から5時間かかっています。しかもその大半はデザイン調整に費やされています。左側を見てください。現状の時間配分です。内容を考えるのに1時間から2時間、デザイン調整に2時間から3時間、修正対応に1時間。右側が本来あるべき姿です。戦略を練るのに3時間、ストーリーを組み立てるのに1時間、仕上げに30分。つまり今、デザインという作業に時間を取られすぎていて、本質的な「何を伝えるか」を考える時間が圧倒的に不足しているのです。これは非常にもったいない状況です。"
      4: "従来の資料作成ワークフローを整理してみましょう。3つのステップがあります。まず構成を考える。何をどの順番で伝えるかを決めます。次にテンプレートを選ぶ。会社のテンプレートがあればそれを使い、なければ探すことから始まります。そして内容を書く。テキストを入力し、箇条書きを整え、図やグラフを作成します。"
      5: "そして最も時間がかかるのが、ここからの2つのステップです。デザイン調整。色、フォント、図形の配置、画像の選定。全体の統一感を出すために細かい調整を何度も繰り返します。ここだけで2時間から3時間かかることも珍しくありません。そして修正対応。上司やチームからのフィードバックを受けて、「ここの色を変えて」「この図をもっと大きく」と修正を繰り返します。修正のたびにデザインの再調整が発生し、さらに時間がかかります。この5つのステップを何度も行ったり来たりして、ようやく1本の資料が完成するのです。合計で3時間から5時間。場合によっては丸一日かかることもあります。"
      6: "では、AIを活用するとどうなるでしょうか。ワークフローは劇的にシンプルになります。やることは基本的に1つだけ。テーマと要件をAIに伝えることです。テーマを伝えると、構成が自動で生成されます。デザインも自動で仕上がります。画像も適切なものが自動で挿入されます。そして完成。この4つが一気に進みます。所要時間は10分から20分。従来の10分の1以下です。しかも、プロのデザイナーが作ったかのような美しい仕上がりになります。もちろん、完全にAI任せというわけではありません。出力を確認し、自分の知見やデータを追加する必要はあります。しかし、ゼロから作るのと比べれば圧倒的に効率的です。従来の5ステップが、実質1ステップに集約されるのです。"
      7: "ここでBefore/Afterを表で比較してみましょう。作成時間は3時間から5時間が10分から20分に。デザインはテンプレート依存がプロ品質の自動生成に。共有方法はファイル添付がURL共有に。修正作業は手動で再編集がプロンプトで即修正に。あらゆる面で、AIの方が圧倒的に効率的なのです。年間で考えると、月に提案資料を4本作る人なら、年間で約200時間の節約になります。これは約25営業日分、つまり1ヶ月分以上の労働時間に相当します。"
      8: "ここで最も重要なポイントをお伝えします。AIの導入は、単に時間を節約するだけではありません。仕事の質そのものが変わるのです。AIがやることは、レイアウト、配色、画像選定、テンプレート作業。これらはすべてAIに任せます。人間がやることは、何を伝えるか、どう伝えるか、提案の本質と戦略。ここに集中します。年間で約300時間の削減が可能です。月30時間が3時間になり、約40営業日分を高付加価値な業務に充てられます。そして最も大切なことは、成果の質が変わるということ。もはやPowerPointの操作スキルではなく、図形を綺麗に並べる技術ではなく、伝える力が武器になる時代なのです。"
      9: "Part 1のまとめです。現状、提案資料1本に3時間から5時間かかっており、その大半がデザイン作業です。AI活用により、10分から20分で完成。90パーセントの時間削減が実現します。そして本質は、作業から思考へのシフトです。デザインはAIに任せ、私たちは「何を伝えるか」に集中する。伝える力が武器になる時代が来ています。"
      10: "次のPart 2では、実際にプロンプトからスライドを生成できるツール「Gamma」の基本的な使い方を紹介します。プロンプト1つで美しい資料が完成する体験を、ぜひ楽しみにしてください。それではPart 2でお会いしましょう。"

  # ============================================================
  # Part 2: Gammaの基本（10分）
  # ============================================================
  - id: "Lec9-2"
    title: "Gammaの基本 — プロンプトからスライドを生成する"
    learning_goals:
      - "Gammaの4ステップでスライドを生成できる"
      - "効果的なプロンプトの書き方がわかる"
      - "PowerPointとGammaの違いを説明できる"

    slides:
      - type: "title"
        title: "Gammaの基本"
        subtitle: "プロンプトからスライドを生成する"

      - type: "goals"
        title: "今日のゴール"
        items:
          - "Gammaの4ステップでスライドを生成できる"
          - "効果的なプロンプトの書き方がわかる"
          - "PowerPointとGammaの違いを説明できる"

      - type: "cards"
        title: "Gammaの4ステップ"
        cards:
          - { icon: "pencil", label: "プロンプト入力", desc: "テーマを文章で伝える", color: "accent" }
          - { icon: "clipboard", label: "アウトライン生成", desc: "構成を自動提案", color: "accent" }
          - { icon: "eye", label: "確認・調整", desc: "構成を微調整", color: "green" }
          - { icon: "star", label: "スライド完成", desc: "デザイン自動生成", color: "amber" }

      - type: "examples"
        title: "Gammaの使い方：画面操作"
        subtitle: "gamma.app にアクセスして始める"
        examples:
          - { label: "Step 1", desc: "gamma.app にアクセス → Googleアカウントでログイン" }
          - { label: "Step 2", desc: "「Create new」→「Presentation」を選択" }
          - { label: "Step 3", desc: "プロンプトを入力して「Generate」をクリック" }
          - { label: "Step 4", desc: "アウトラインを確認 →「Continue」でスライド生成" }
        insight: "アカウント作成からスライド完成まで、初回でも10分で到達可能"

      - type: "examples"
        title: "入力プロンプトの例"
        number: 1
        subtitle: "テーマ・構成・スライド数・トーンを指定するのがポイント"
        examples:
          - { label: "テーマ", desc: "中小企業向けAI導入提案書" }
          - { label: "構成指定", desc: "現状の課題 → AI活用提案3つ → 投資対効果 → スケジュール → 事例" }
          - { label: "デザイン", desc: "ビジネスフォーマル、10スライド程度" }
        insight: "指定が具体的なほど、Gammaの出力品質が上がる"

      - type: "table"
        title: "PowerPoint vs Gamma 比較"
        headers: ["", "PowerPoint", "Gamma"]
        header_colors: ["offWhite", "red", "accent"]
        rows:
          - ["10スライド提案資料", "3〜5時間", "約5分"]
          - ["デザイン品質", "テンプレート依存", "プロ品質を自動生成"]
          - ["共有方法", "ファイル添付", "URL共有（Web形式）"]
          - ["修正作業", "手動で再編集", "プロンプトで即修正"]

      - type: "caution"
        title: "Gammaの注意点と活用のコツ"
        items:
          - { icon: "lock", title: "無料プランの制限", desc: "月の生成回数に上限あり。本格利用はPro版（月$10〜）を検討。", color: "amber" }
          - { icon: "globe", title: "言語の精度", desc: "日本語対応だが英語の方が精度が高い場合も。試しに英語入力も。", color: "accent" }
          - { icon: "link", title: "共有はURL推奨", desc: "PPTXエクスポートも可能だが、デザイン再現性はURL共有が優秀。", color: "green" }

      - type: "summary"
        title: "Part 2 まとめ"
        items:
          - { label: "Gammaとは", text: "プロンプトからスライドを自動生成するAIツール", color: "accent" }
          - { label: "4ステップ", text: "入力 → アウトライン → 確認 → 完成（約5分）", color: "green" }
          - { label: "ポイント", text: "テーマ・構成・トーンを具体的に指定するほど品質UP", color: "amber" }

      - type: "end"
        test_count: 0
        next: "Lec9-3 Claude + Gamma連携"

    narrations:
      1: "Part 2では、プレゼン資料を自動生成するAIツール「Gamma」について詳しく学んでいきます。Gammaは、ガンマ・ドット・アプリ、gamma.appでアクセスできるWebベースのサービスです。最大の特徴は、テキストのプロンプトを入力するだけで、プロフェッショナルなスライドが自動で生成されることです。PowerPointのような従来のプレゼンツールとは根本的に異なるアプローチで、デザインの知識がなくても美しい資料が作れます。基本的な機能は無料で使えますので、この講座を見ながらぜひ実際にアクセスして一緒に試してみてください。"
      2: "今日のゴールは3つです。1つ目、Gammaの4ステップでスライドを生成できるようになること。2つ目、効果的なプロンプトの書き方がわかること。3つ目、PowerPointとGammaの違いを説明できること。この3つを押さえれば、Gammaを実務で使い始められます。"
      3: "Gammaでスライドを作る流れは、たった4つのステップで完了します。1つ目、プロンプト入力。作りたい資料のテーマを自然な文章で入力するだけです。特別なフォーマットは不要です。2つ目、アウトライン生成。Gammaが入力内容を分析して、スライドの構成を自動で提案してくれます。3つ目、確認・調整。生成されたアウトラインを確認し、スライドの順番変更や追加・削除ができます。この段階で骨格を固めるのがポイントです。4つ目、スライド完成。アウトラインを確定すると、デザイン付きのスライドが自動で生成されます。画像も自動挿入され、配色もプロ品質に仕上がります。この4ステップが早ければ5分で完了します。"
      4: "実際の画面操作を説明します。まずgamma.appにアクセスして、Googleアカウントでログインします。ワンクリックで完了です。ホーム画面で「Create new」をクリックし、「Presentation」を選択。プロンプトの入力画面が表示されるので、作りたい資料の内容を入力します。「Generate」をクリックすると、アウトラインが生成されます。各スライドのタイトルと概要を確認し、「Continue」をクリックすると、デザイン込みのスライドが一気に完成します。アカウント作成からスライド完成まで、初回でも10分あれば到達できます。"
      5: "具体的なプロンプト例を見てみましょう。テーマは「中小企業向けAI導入提案書」です。構成を具体的に指定しています。現状の課題、AI活用提案を3つ、投資対効果、導入スケジュール、成功事例の順です。デザインはビジネスフォーマルで10スライド程度と指定しています。ポイントは、テーマだけでなく、構成、スライド数、トーンまで指定することです。指定が具体的なほど、Gammaの出力品質が上がります。漠然と「提案資料を作って」と入力するのと、このように詳細に指定するのでは、出力の質が全く異なります。"
      6: "PowerPointとGammaを表で比較してみましょう。10スライドの提案資料を作る場合、PowerPointでは3時間から5時間。Gammaでは約5分です。30倍以上の速度差があります。デザイン品質は、PowerPointがテンプレート依存なのに対し、Gammaはプロ品質を毎回自動生成します。共有方法も、ファイル添付からURL共有へ。相手はクリックするだけでブラウザ上で閲覧できます。修正も、手動で再編集する必要がなく、プロンプトで指示するだけで即座に反映されます。あらゆる面でGammaが効率的です。"
      7: "Gammaを使う上での注意点を3つお伝えします。1つ目、無料プランには月の生成回数に上限があります。本格的に使う場合はPro版を検討してください。月10ドル程度からです。2つ目、言語の精度です。日本語に対応していますが、英語の方が精度が高い場合もあります。思った結果が出なければ英語で試してみてください。3つ目、共有方法です。PowerPoint形式でのエクスポートも可能ですが、デザインの再現性はURL共有の方が優れています。Web形式でそのまま共有するのがおすすめです。"
      8: "Part 2のまとめです。Gammaは、プロンプトからスライドを自動生成するAIツールです。入力、アウトライン、確認、完成の4ステップで、約5分で資料が完成します。そしてポイントは、テーマ、構成、トーンを具体的に指定するほど品質が上がるということ。次のPart 3では、Claudeと組み合わせて内容の質をさらに高める方法を学びます。"
      9: "次の動画に進んでください。Lec9-3 Claude + Gamma連携です。Gammaだけでも資料は作れますが、Claudeと組み合わせると提案の説得力が全く変わります。お楽しみに。"

  # ============================================================
  # Part 3: Claude + Gamma連携（10分）
  # ============================================================
  - id: "Lec9-3"
    title: "Claude + Gamma連携 — 内容設計からビジュアル化まで"
    learning_goals:
      - "Claude → Gammaの3ステップワークフローを実践できる"
      - "Claudeへの効果的な指示の出し方がわかる"
      - "対象者・目的・制約の3つのポイントを使いこなせる"

    slides:
      - type: "title"
        title: "Claude + Gamma 連携"
        subtitle: "内容設計からビジュアル化まで"

      - type: "goals"
        title: "今日のゴール"
        items:
          - "Claude → Gammaの3ステップワークフローを実践できる"
          - "Claudeへの効果的な指示の出し方がわかる"
          - "対象者・目的・制約の3つのポイントを使いこなせる"

      - type: "definition"
        title: "なぜClaudeと連携するのか"
        definition: "Gammaはビジュアルに強い。Claudeは内容の論理性・具体性に強い。組み合わせが最強。"
        comparison:
          left: { label: "Gamma単体", steps: ["見た目は綺麗", "内容は一般的", "数字・根拠が弱い"] }
          right: { label: "Claude + Gamma", steps: ["見た目も綺麗", "内容が深い", "具体的な数字・事例入り"] }
        footnote: "Claude = 内容の質、Gamma = ビジュアルの質。それぞれの得意分野を活かす分業。"

      - type: "examples"
        title: "ワークフロー：3ステップ"
        subtitle: "Claudeで内容を練り、Gammaでビジュアル化する"
        flow: ["Claudeに依頼", "Gammaに貼り付け", "確認・微調整"]
        examples:
          - { label: "Step 1", desc: "テーマ・対象者・目的を伝え、スライドごとの内容を出力してもらう" }
          - { label: "Step 2", desc: "「Paste in text」でClaudeの出力をGammaに貼り付ける" }
          - { label: "Step 3", desc: "スライドを確認し、画像やレイアウトを微調整して完成" }
        insight: "全体の所要時間は10〜15分。内容もデザインも高品質"

      - type: "examples"
        title: "Claudeへの依頼方法"
        number: 1
        subtitle: "具体的な情報を伝えるほど、出力の質が上がる"
        examples:
          - { label: "対象者", desc: "製造業の工場長クラス。人手不足と品質管理が課題。" }
          - { label: "目的", desc: "次回の予算会議でAI導入の承認を得たい。" }
          - { label: "構成指定", desc: "各スライドにタイトル、3つのポイント、補足説明をつけて。" }
          - { label: "特に重視", desc: "投資対効果の試算は導入コスト・運用コスト・削減効果を具体的に。" }
        insight: "テーマだけでなく、対象者・目的・構成の形式まで伝えるのがコツ"

      - type: "cards"
        title: "質を上げる3つのポイント"
        cards:
          - { icon: "users", label: "対象者を明確に", desc: "業種・役職・課題感", color: "accent" }
          - { icon: "target", label: "目的を伝える", desc: "受注・承認・情報共有", color: "green" }
          - { icon: "clipboard", label: "制約を指定", desc: "枚数・トーン・必須項目", color: "amber" }

      - type: "examples"
        title: "実際のプロンプト例"
        number: 2
        subtitle: "小売業クライアント向けDX推進提案"
        badge: "そのまま使える"
        examples:
          - { label: "対象", desc: "小売業・経営企画部長 → 役員会で導入承認を得る" }
          - { label: "構成", desc: "業界課題 → DX解決策3つ → ROI試算(3年) → スケジュール → 成功事例" }
          - { label: "形式", desc: "8スライド・フォーマル・各スライドにタイトル+ポイント3つ+補足" }
        insight: "3つのポイント（対象者・目的・制約）がすべて含まれている"

      - type: "summary"
        title: "Part 3 まとめ"
        items:
          - { label: "連携の価値", text: "Claude=内容の質 + Gamma=ビジュアルの質 = 最強の組み合わせ", color: "accent" }
          - { label: "3ステップ", text: "Claude依頼 → Gamma貼り付け → 確認・微調整（10〜15分）", color: "green" }
          - { label: "質を上げるコツ", text: "対象者・目的・制約の3つをClaudeに伝える", color: "amber" }

      - type: "end"
        test_count: 0
        next: "Lec9-4 実践ハンズオン"

    narrations:
      1: "Part 3では、ClaudeとGammaを連携させるワークフローを学びます。前のPartでGammaに直接プロンプトを入れてスライドを作る方法を学びました。しかし、Gammaはあくまでスライドを見た目よく作ることに特化したツールです。内容の論理性や具体性には限界があります。ここでClaudeの出番です。Claudeで内容を練り、Gammaでビジュアル化する。この組み合わせが最強なのです。"
      2: "今日のゴールは3つです。1つ目、Claude、Gammaの3ステップワークフローを実践できるようになること。2つ目、Claudeへの効果的な指示の出し方がわかること。3つ目、対象者、目的、制約の3つのポイントを使いこなせること。この3つを押さえれば、内容もデザインも高品質な提案資料が作れるようになります。"
      3: "なぜClaudeと連携する必要があるのか。Gamma単体でも見た目は綺麗な資料が作れます。しかし内容は一般的で、具体的な数字や根拠が弱くなりがちです。一方、ClaudeとGammaを組み合わせると、見た目も綺麗で、かつ内容が深く、具体的な数字や事例が入った説得力のある資料になります。Claudeが内容の質を担い、Gammaがビジュアルの質を担う。それぞれの得意分野を活かした分業です。"
      4: "連携ワークフローは3ステップです。まずClaudeにテーマ、対象者、目的を伝え、スライドごとの内容を出力してもらいます。次にGammaの「Paste in text」機能でClaudeの出力をそのまま貼り付けます。最後にスライドを確認し、画像やレイアウトを微調整して完成です。全体の所要時間は10分から15分。しかも内容もデザインも高品質です。ポイントは、ステップ1のClaudeへの依頼です。ここで具体的な情報を伝えるほど、最終的な資料の質が上がります。"
      5: "Claudeへの依頼方法を具体的に見てみましょう。まず対象者を明確にします。製造業の工場長クラスで、人手不足と品質管理が課題、というように具体的に伝えます。次に目的。次回の予算会議でAI導入の承認を得たい。そして構成の形式。各スライドにタイトル、3つのポイント、補足説明をつけてほしい。特に投資対効果の試算は導入コスト、運用コスト、削減効果を具体的な数字で示してほしい。このようにテーマだけでなく、対象者、目的、構成の形式まで伝えることで、Claudeは的確で説得力のある内容を生成してくれます。"
      6: "質を上げるための3つのポイントを整理します。1つ目、対象者を明確にする。業種、役職、課題感を伝えることで、相手に刺さる内容になります。2つ目、目的を伝える。受注を取りたいのか、社内承認を得たいのか、情報共有が目的なのか。目的によって構成が変わります。3つ目、制約を指定する。スライド数、トーン、必ず入れたい項目。この3つのポイントをClaudeに伝えるだけで、出力の質が劇的に向上します。"
      7: "実際に使えるプロンプトの例をお見せします。小売業のクライアント向けDX推進提案です。対象は経営企画部長で、目的は役員会で導入承認を得ること。構成は業界課題、DX解決策3つ、ROI試算として3年間の投資対効果、導入スケジュール、成功事例。形式は8スライド、フォーマルなトーンで、各スライドにタイトル、ポイント3つ、補足説明をつける。このプロンプトには3つのポイント、つまり対象者、目的、制約がすべて含まれています。そのまま使えるテンプレートとして活用してください。"
      8: "Part 3のまとめです。連携の価値は、Claudeの内容の質とGammaのビジュアルの質を掛け合わせた、最強の組み合わせであること。3ステップのワークフローで10分から15分で完成します。質を上げるコツは、対象者、目的、制約の3つをClaudeに伝えることです。"
      9: "次のPart 4は実践ハンズオンです。皆さん自身の業務テーマで、今学んだClaude、Gammaの流れで実際に提案資料を作っていただきます。3つのポイントを意識して取り組んでみてください。"

  # ============================================================
  # Part 4: 実践デモ — Claude→Gammaで資料を作る（10分）
  # ============================================================
  - id: "Lec9-4"
    title: "実践デモ — Claude→Gammaで資料を作る一部始終"
    learning_goals:
      - "Claude→Gammaの実際の操作手順を見て理解できる"
      - "プロンプトの具体的な書き方を実例で学べる"
      - "自分の業務テーマで同じ流れを再現できる"

    slides:
      - type: "title"
        title: "実践デモ"
        subtitle: "Claude→Gammaで資料を作る一部始終"

      - type: "goals"
        title: "このパートで見ること"
        items:
          - "Claudeに製造業向けAI研修の提案資料を依頼する"
          - "生成された構成をGammaに貼り付けてスライド化する"
          - "完成までの全操作を実際の画面で確認する"

      - type: "examples"
