        insight: "Claudeの構成がしっかりしていれば、Gammaでの調整はほぼ不要"

      - type: "definition"
        title: "完成した資料のポイント"
        definition: "製造業の現場課題から出発し、ChatGPTの具体的な活用シーンまで落とし込んだ提案資料"
        comparison:
          left: { label: "Claudeが担ったこと", steps: ["製造業の課題分析", "16枚の構成設計", "現場目線の事例作成"] }
          right: { label: "Gammaが担ったこと", steps: ["プロ品質のデザイン", "画像の自動挿入", "Web形式で即共有"] }
        footnote: "合計所要時間：約10分。従来なら半日かかる品質の提案資料が完成。"

      - type: "grid"
        title: "あなたの番です"
        items:
          - { icon: "pencil", label: "テーマを決める", desc: "自分の業務で実際に作りたい提案資料を1つ選ぶ" }
          - { icon: "users", label: "対象者を明確に", desc: "誰に見せるのか？業種・役職・課題は？" }
