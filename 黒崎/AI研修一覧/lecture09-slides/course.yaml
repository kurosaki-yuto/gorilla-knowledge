        examples:
          - { label: "プロンプト", desc: "「AI研修を製造業の方向きに導入していきたい。そんな資料を作ってください」" }
          - { label: "追加指示", desc: "「マークダウンで構成を作って。製造業のリアルな課題から落としたい」" }
          - { label: "Claudeの出力", desc: "全16枚のスライド構成（表紙、ゴール、課題提起、活用事例、演習…）" }
        insight: "具体的な業界・課題を伝えると、Claudeは現場に即した内容を生成する"

      - type: "examples"
        title: "Step 2：Gammaでスライド化"
        number: 3
        subtitle: "Claudeの出力をGammaに貼り付けてスライドを生成する"
        flow: ["Claudeの出力をコピー", "Gammaで「Paste in text」", "テーマを選択", "スライド生成"]
        examples:
          - { label: "テキスト量", desc: "Claudeが生成した全16枚分の構成をそのまま貼り付け" }
          - { label: "Gamma設定", desc: "テーマ選択→「生成」ボタンで一発生成" }
