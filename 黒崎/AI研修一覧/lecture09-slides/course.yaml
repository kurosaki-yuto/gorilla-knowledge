          - { label: "テーマ", desc: "製造現場で即使えるAI活用入門" }
          - { label: "対象", desc: "製造現場の一般社員・ライン担当者" }
          - { label: "目的", desc: "ChatGPTを実務で使いこなせるようにする研修を提案" }
          - { label: "使用ツール", desc: "Claude（構成作成）→ Gamma（スライド化）" }
        insight: "Part 3で学んだ「対象者・目的・制約」を実際に使う"

      - type: "examples"
