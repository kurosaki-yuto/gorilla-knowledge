course:
  id: "AI-203"
  title: "マルチエージェントシステム"
  subtitle: "複数AIの協調で複雑な業務を解決する"
  level: "応用"
  target: "全社員"
  duration: "10分"
  category: "AIエージェント"

chapters:
  - id: "AI-203"
    title: "マルチエージェントシステム — 複数AIの協調で複雑な業務を解決する"
    learning_goals:
      - "マルチエージェントとは何かを説明できる"
      - "エージェント間の協調パターンを理解できる"
      - "業務での活用イメージを持てる"

    slides:
      - type: "title"
        title: "マルチエージェントシステム"
        subtitle: "複数AIの協調で複雑な業務を解決する"

      - type: "goals"
        title: "今日のゴール"
        items:
          - "マルチエージェントとは何かを説明できる"
          - "エージェント間の協調パターンを理解できる"
          - "業務での活用イメージを持てる"

      - type: "definition"
        title: "マルチエージェントとは？"
        definition: "役割の異なる複数のAIエージェントが協力して1つの目標を達成するシステム"
        comparison:
          left: { label: "シングルエージェント", steps: ["1つのAIが全部やる", "得意・不得意が混在", "複雑なタスクに限界"] }
          right: { label: "マルチエージェント", steps: ["専門家チームのように分担", "各AIが得意分野に集中", "複雑なタスクも高品質"] }
        footnote: "人間のチームワークと同じ。専門家が協力すると、1人でやるより良い結果が出る。"

      - type: "cards"
        title: "3つの協調パターン"
        cards:
          - { icon: "sitemap", label: "階層型", desc: "リーダーが指揮し専門家が実行", color: "accent" }
          - { icon: "comments", label: "議論型", desc: "エージェント同士が議論して結論を出す", color: "green" }
          - { icon: "sync", label: "パイプライン型", desc: "工程順にリレーして成果物を仕上げる", color: "amber" }

      - type: "examples"
        title: "階層型パターン"
        number: 1
        subtitle: "オーケストレーター（指揮者）が全体を管理し、専門エージェントに仕事を振る"
        flow: ["指揮者AI", "リサーチAI", "ライティングAI", "レビューAI"]
        examples:
          - { label: "指揮者", desc: "タスクを分解し、適切なエージェントに割り振る" }
          - { label: "専門家", desc: "各自の得意分野で最高品質のアウトプットを出す" }
          - { label: "統合", desc: "指揮者が成果物を統合し最終チェック" }
        insight: "最も一般的なパターン。管理がしやすく安定した結果を出せる"

      - type: "examples"
        title: "議論型パターン"
        number: 2
        subtitle: "複数のAIが異なる視点で議論し、より良い結論を導き出す"
        examples:
          - { label: "賛成派AI", desc: "提案のメリットを論理的に主張する" }
          - { label: "反対派AI", desc: "リスクや課題を指摘する" }
          - { label: "まとめ役AI", desc: "双方の意見を統合し最終判断を下す" }
        pros: "多角的な視点で偏りのない結論"
        cons: "処理時間が長くなる場合がある"

      - type: "examples"
        title: "パイプライン型パターン"
        number: 3
        subtitle: "製造ラインのように各工程をリレーする"
        flow: ["情報収集AI", "分析AI", "文章作成AI", "校正AI"]
        examples:
          - { label: "工程1", desc: "前工程の成果物を受け取り、自分の処理を加える" }
          - { label: "工程2", desc: "次の工程に成果物を渡す" }
          - { label: "完成", desc: "全工程を経て最終成果物が完成" }
        insight: "各工程が独立しているため品質管理しやすい"

      - type: "table"
        title: "協調パターン比較"
        headers: ["", "階層型", "議論型", "パイプライン型"]
        header_colors: ["offWhite", "accent", "green", "amber"]
        rows:
          - ["仕組み", "指揮者が分担", "エージェント同士が議論", "工程順にリレー"]
          - ["向いている業務", "プロジェクト管理", "戦略立案・企画", "コンテンツ制作"]
          - ["メリット", "管理しやすい", "多角的な視点", "品質管理が容易"]

      - type: "grid"
        title: "業務での活用シーン"
        items:
          - { icon: "file", label: "レポート作成", desc: "調査→分析→執筆→校正を4つのAIで分担" }
          - { icon: "code", label: "システム開発", desc: "設計AI→実装AI→テストAI→レビューAI" }
          - { icon: "briefcase", label: "採用プロセス", desc: "書類選考AI→質問生成AI→評価AI" }
          - { icon: "globe", label: "多言語対応", desc: "翻訳AI→文化適応AI→品質チェックAI" }
        key_message: "1つのAIでは難しい複雑なタスクを、チームワークで解決"

      - type: "caution"
        title: "マルチエージェントの注意点"
        items:
          - { icon: "bolt", title: "コストが増える", desc: "エージェント数に応じてAPI利用料が増加。費用対効果を検証。", color: "amber" }
          - { icon: "eye", title: "エラーの連鎖リスク", desc: "1つのエージェントのミスが後工程に伝播。中間チェックが重要。", color: "red" }
          - { icon: "lock", title: "情報共有の管理", desc: "エージェント間で共有するデータの機密レベルを管理する。", color: "red" }

      - type: "summary"
        title: "まとめ"
        items:
          - { label: "マルチエージェント", text: "複数AIが協力して複雑なタスクを達成", color: "accent" }
          - { label: "3つのパターン", text: "階層型・議論型・パイプライン型", color: "green" }
          - { label: "活用場面", text: "レポート・開発・採用・多言語対応", color: "amber" }
          - { label: "注意点", text: "コスト増・エラー連鎖・情報共有管理", color: "red" }

      - type: "end"
        test_count: 5
        pass_rate: 80
        next: "AI-204 AIエージェント開発入門"

    test:
      pass_rate: 80
      questions:
        - question: "マルチエージェントシステムとは何ですか？"
          choices:
            - "A. 1つの高性能AIがすべてを処理するシステム"
            - "B. 役割の異なる複数のAIが協力して目標を達成するシステム"
            - "C. AIを使わずに複数人で作業するシステム"
            - "D. AI同士が競争して最も良い回答を選ぶシステム"
          answer: "B"
          explanation: "マルチエージェントは複数の専門AIが協力して1つの目標を達成する仕組み。"

        - question: "階層型パターンの特徴として正しいものは？"
          choices:
            - "A. エージェント同士が対等に議論する"
            - "B. 指揮者（オーケストレーター）が全体を管理し、専門家に仕事を振る"
            - "C. 工程順にリレー形式で処理する"
            - "D. エージェントが自由に好きなタスクを選ぶ"
          answer: "B"
          explanation: "階層型はリーダーAIが全体を管理し、専門エージェントにタスクを割り振るパターン。"

        - question: "議論型パターンが最も向いている業務は？"
          choices:
            - "A. 単純なデータ入力"
            - "B. 定型的な文書作成"
            - "C. 戦略立案や企画など多角的な視点が必要な業務"
            - "D. ファイルのコピーや移動"
          answer: "C"
          explanation: "議論型は複数のAIが異なる視点で議論するため、戦略立案や企画に適している。"

        - question: "マルチエージェントの注意点として正しいものは？"
          choices:
            - "A. コストは変わらないので気にしなくてよい"
            - "B. 1つのエージェントのミスが後工程に伝播するリスクがある"
            - "C. エージェント同士は完全に独立しているので情報管理は不要"
            - "D. マルチエージェントはシングルより常に高品質"
          answer: "B"
          explanation: "エラーの連鎖リスクがあるため、中間チェックポイントの設置が重要。"

        - question: "パイプライン型パターンの説明として正しいものは？"
          choices:
            - "A. 全エージェントが同時に作業する"
            - "B. 指揮者がすべてを管理する"
            - "C. 製造ラインのように各工程をリレー形式で処理する"
            - "D. エージェント同士が議論して結論を出す"
          answer: "C"
          explanation: "パイプライン型は各工程が順番に処理を行うリレー方式。品質管理がしやすい。"

    narrations:
      1: "この動画では、複数のAIエージェントが協力して複雑な業務を解決する「マルチエージェントシステム」について10分で解説します。"
      2: "今日のゴールは3つ。マルチエージェントとは何かを説明できること、エージェント間の協調パターンを理解すること、業務での活用イメージを持てることです。"
      3: "マルチエージェントとは、役割の異なる複数のAIエージェントが協力して1つの目標を達成するシステムです。1つのAIが全部やるシングルエージェントと比べて、専門家チームのように役割分担するため、複雑なタスクでも高品質な結果を出せます。人間のチームワークと同じで、専門家が協力すると1人でやるより良い結果が出ますよね。"
      4: "協調パターンは大きく3つあります。階層型はリーダーが指揮して専門家が実行するパターン。議論型はエージェント同士が議論して結論を出すパターン。パイプライン型は工程順にリレーして成果物を仕上げるパターンです。"
      5: "まず階層型パターンを詳しく見ましょう。オーケストレーター、つまり指揮者AIが全体を管理します。タスクを分解してリサーチAI、ライティングAI、レビューAIなどの専門エージェントに割り振り、各自が得意分野で最高品質のアウトプットを出します。最後に指揮者が成果物を統合して最終チェック。最も一般的で管理しやすいパターンです。"
      6: "次に議論型パターンです。賛成派AIがメリットを主張し、反対派AIがリスクを指摘し、まとめ役AIが双方の意見を統合して最終判断を下します。多角的な視点で偏りのない結論が得られるのがメリットですが、処理時間が長くなる場合があります。"
      7: "3つ目のパイプライン型は製造ラインのようなイメージです。情報収集AI、分析AI、文章作成AI、校正AIが順番に処理します。各工程が独立しているため品質管理がしやすく、コンテンツ制作に特に向いています。"
      8: "3つのパターンを比較すると、階層型はプロジェクト管理向きで管理しやすい。議論型は戦略立案や企画向きで多角的な視点が得られる。パイプライン型はコンテンツ制作向きで品質管理が容易です。業務の内容に合わせて使い分けましょう。"
      9: "業務での活用シーンを見てみましょう。レポート作成では調査、分析、執筆、校正を4つのAIで分担。システム開発では設計、実装、テスト、レビューを分業。採用プロセスでは書類選考、質問生成、評価を自動化。多言語対応では翻訳、文化適応、品質チェックを分担。1つのAIでは難しい複雑なタスクをチームワークで解決できます。"
      10: "注意点は3つです。コストが増えること。エージェント数に応じてAPI利用料が増加するので費用対効果を検証しましょう。エラーの連鎖リスク。1つのエージェントのミスが後工程に伝わるので中間チェックが重要です。情報共有の管理。エージェント間で共有するデータの機密レベルを管理しましょう。"
      11: "まとめです。マルチエージェントは複数AIが協力して複雑なタスクを達成するシステム。3つのパターンは階層型、議論型、パイプライン型。活用場面はレポート、開発、採用、多言語対応。注意点はコスト増、エラー連鎖、情報共有管理です。"
      12: "お疲れさまでした。確認テスト5問中4問正解で修了です。挑戦してみてください。"
