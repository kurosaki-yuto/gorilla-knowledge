# ==================================================
# AI研修コース定義 サンプル
# このファイルをコピーして course.yaml として使う
# ==================================================

course:
  id: "AI-101"
  title: "AIの基本"
  subtitle: "仕組みと種類を理解する"
  level: "入門"          # 入門 / 実践 / 応用 / 管理者
  target: "全社員"
  duration: "10分"
  category: "AI入門"

# ==================================================
# チャプター定義
# 1コース = 複数チャプター（各10分）
# ==================================================

chapters:
  - id: "AI-101"
    title: "AIの基本 — 仕組みと種類を理解する"
    learning_goals:
      - "AIとは何かを一言で説明できる"
      - "AIの3つの種類（ルールベース・機械学習・生成AI）を区別できる"
      - "自分の業務でAIが使えそうな場面をイメージできる"

    # スライド構成（12枚 = 約10分）
    # type: title / goals / definition / cards / table / examples / caution / summary / end
    slides:
      - type: "title"
        title: "AIの基本"
        subtitle: "仕組みと種類を理解する"

      - type: "goals"
        title: "今日のゴール"
        items:
          - "AIとは何かを一言で説明できる"
          - "AIの3つの種類を区別できる"
          - "自分の業務でAIが使えそうな場面をイメージできる"

      - type: "definition"
        title: "AIとは何か？"
        definition: "人間がやっていた「判断」を、コンピュータにやらせる技術"
        comparison:
          left: { label: "人間の判断", steps: ["データを見る", "経験から考える", "判断する"] }
          right: { label: "AIの判断", steps: ["データを入れる", "パターンを計算", "答えを出す"] }
        footnote: "AIは「考えている」わけではない。大量のデータからパターンを見つけて答えを出しているだけ。"

      - type: "cards"
        title: "AIの3つの種類"
        cards:
          - { icon: "cogs", label: "ルールベースAI", desc: "人間がルールを書く", color: "accent" }
          - { icon: "database", label: "機械学習AI", desc: "データからパターンを学ぶ", color: "green" }
          - { icon: "magic", label: "生成AI", desc: "新しいコンテンツを作る", color: "amber" }

      - type: "examples"
        title: "ルールベースAI"
        number: 1
        subtitle: "「もし〇〇なら△△する」— 人間がルールを全部書く"
        examples:
          - { label: "チャットボット", input: "「営業時間は？」", output: "「9時〜18時です」" }
          - { label: "経費精算", input: "金額が10万円以上", output: "部長承認が必要" }
          - { label: "メールフィルタ", input: "件名に「当選」を含む", output: "迷惑メールへ" }
        pros: "動きが予測でき、説明しやすい"
        cons: "想定外のことには対応できない"

      - type: "examples"
        title: "機械学習AI"
        number: 2
        subtitle: "人間がルールを書くのではなく、AIがデータからパターンを自分で見つける"
        flow: ["大量のデータ", "学習", "パターン発見", "予測・分類"]
        examples:
          - { label: "売上予測", desc: "過去の販売データから来月の売上を予測" }
          - { label: "異常検知", desc: "工場のセンサーデータから故障の予兆を検知" }
          - { label: "レコメンド", desc: "購買履歴をもとに「この商品もおすすめ」を表示" }
        pros: "人間が見逃すパターンも発見"
        cons: "なぜその答えか説明しにくい"

      - type: "examples"
        title: "生成AI"
        number: 3
        subtitle: "学習したデータをもとに新しいコンテンツを「生成」する"
        badge: "いま最も注目"
        examples:
          - { label: "文章生成", tools: "ChatGPT / Claude", desc: "メール文、議事録要約、企画書のたたき台" }
          - { label: "画像生成", tools: "Midjourney / DALL-E", desc: "デザイン案、イメージ画像" }
          - { label: "コード生成", tools: "GitHub Copilot", desc: "プログラムの自動生成" }
        insight: "2022年末〜爆発的に普及。業務への影響が最も大きい領域。"

      - type: "table"
        title: "3つの種類 — 比較"
        headers: ["", "ルールベース", "機械学習", "生成AI"]
        header_colors: ["offWhite", "accent", "green", "amber"]
        rows:
          - ["やり方", "人間がルールを書く", "データから学ぶ", "データから学んで作る"]
          - ["得意なこと", "決まった応答", "予測・分類", "新しいコンテンツ生成"]
          - ["身近な例", "社内チャットボット", "Amazonレコメンド", "ChatGPT / Claude"]

      - type: "grid"
        title: "あなたの業務ではどう使える？"
        items:
          - { icon: "envelope", label: "文書作成", desc: "メール下書き、報告書の要約、翻訳" }
          - { icon: "search", label: "情報整理", desc: "議事録作成、データの分類・集計" }
          - { icon: "comments", label: "アイデア出し", desc: "企画のブレスト、キャッチコピー案" }
          - { icon: "cart", label: "調査・リサーチ", desc: "市場調査の要約、競合分析の補助" }
        key_message: "「AIに全部任せる」のではなく「AIに下書きさせて、人間が仕上げる」が基本"

      - type: "caution"
        title: "AIを使うときの3つの注意点"
        items:
          - { icon: "lock", title: "機密情報を入れない", desc: "社外AIに顧客情報や社内機密を入力しない。会社のAI利用ルールを確認。", color: "red" }
          - { icon: "eye", title: "答えを鵜呑みにしない", desc: "AIは自信満々に間違える（ハルシネーション）。必ず人間がファクトチェック。", color: "amber" }
          - { icon: "balance", title: "著作権に注意する", desc: "AI生成物の著作権は法的にグレー。外部公開する場合は上長に確認。", color: "red" }

      - type: "summary"
        title: "まとめ"
        items:
          - { label: "AIとは", text: "「人間の判断をコンピュータにやらせる技術」", color: "accent" }
          - { label: "3つの種類", text: "ルールベース → 機械学習 → 生成AI", color: "green" }
          - { label: "業務活用", text: "下書き・要約・アイデア出し・リサーチに有効", color: "amber" }
          - { label: "注意点", text: "機密情報NG / 鵜呑みNG / 著作権に注意", color: "red" }

      - type: "end"
        test_count: 5
        pass_rate: 80
        next: "AI-102 生成AIでできること・できないこと"

    # テスト定義
    test:
      pass_rate: 80
      questions:
        - question: "AIを一言で表すと、最も適切なものはどれですか？"
          choices:
            - "A. コンピュータが自分の意思で考える技術"
            - "B. 人間がやっていた判断をコンピュータにやらせる技術"
            - "C. ロボットが人間の代わりに働く技術"
            - "D. インターネットで情報を検索する技術"
          answer: "B"
          explanation: "AIはデータに基づくパターン認識で判断を行う技術。自分の意思で考えているわけではない。"

        - question: "「人間がルールを事前にすべて書いておき、その通りに応答するAI」は？"
          choices:
            - "A. 機械学習AI"
            - "B. 生成AI"
            - "C. ルールベースAI"
            - "D. 汎用AI"
          answer: "C"
          explanation: "ルールベースAIは「もし〇〇なら△△する」というルールを人間が書くタイプ。"

        - question: "ChatGPTやClaudeのように「新しい文章を作り出せるAI」は？"
          choices:
            - "A. ルールベースAI"
            - "B. 機械学習AI"
            - "C. 検索AI"
            - "D. 生成AI"
          answer: "D"
          explanation: "生成AIは学習データをもとに文章・画像・コード等の新しいコンテンツを生成できる。"

        - question: "業務でAIを使うときの正しい姿勢は？"
          choices:
            - "A. AIの出力はプロが作ったものなので、そのまま使ってよい"
            - "B. AIに下書きさせて、人間が確認・修正して仕上げる"
            - "C. 効率のために、顧客の個人情報もAIに入力して処理させる"
            - "D. AIの答えが間違っていることはほぼないので、ファクトチェックは不要"
          answer: "B"
          explanation: "AIはハルシネーションで間違えることがあり、機密情報の入力もNG。「AI下書き→人間仕上げ」が基本。"

        - question: "AIが自信を持って誤った情報を出力する現象を何と言いますか？"
          choices:
            - "A. バグ"
            - "B. ハルシネーション"
            - "C. フィッシング"
            - "D. オーバーフロー"
          answer: "B"
          explanation: "ハルシネーション（幻覚）はAIがもっともらしいが事実でない内容を生成する現象。"

    # ナレーション台本（スライド番号 → テキスト）
    narrations:
      1: "この動画では、AIとは何か、どんな種類があるのか、そして皆さんの業務にどう関係するのかを10分で解説します。ITの知識がなくても大丈夫です。一緒に見ていきましょう。"
      2: "今日のゴールは3つです。1つ目、AIとは何かを一言で説明できるようになること。2つ目、AIの3つの種類を区別できること。3つ目、自分の業務でAIが使えそうな場面をイメージできること。この3つを押さえれば、AIの基本はバッチリです。"
      3: "まず、AIって結局なんなのか。一言で言うと、「人間がやっていた判断を、コンピュータにやらせる技術」です。たとえば人間は、メールを見て「これはスパムだな」と判断しますよね。AIも同じことをやります。ただし、人間のように「考えている」わけではありません。大量のメールデータからパターンを学習して、「このパターンに当てはまるからスパムだ」と判定しているだけです。ここが大事なポイントです。AIは魔法ではなく、あくまでデータに基づくパターン認識の技術です。"
      4: "AIには大きく分けて3つの種類があります。ルールベースAI、機械学習AI、そして生成AI。これから1つずつ見ていきますが、まずはこの3つがあるんだということだけ頭に入れてください。"
      5: "1つ目のルールベースAI。これは人間が「もしこうならこうする」というルールを全部書いてあげるタイプです。身近な例でいうと、会社のチャットボット。「営業時間は?」と聞くと「9時から18時です」と返ってくる。あれはAIが考えているんじゃなくて、人間が事前にQ&Aを全部登録しているんです。メリットは動きが予測できること。デメリットは、ルールに書いていないことには一切対応できないこと。"
      6: "2つ目の機械学習AI。これはルールを人間が書くのではなく、AIがデータから自分でパターンを見つけるタイプです。たとえば売上予測。過去3年分の販売データをAIに食べさせると、「この時期にこの商品が売れやすい」というパターンを自動的に見つけて、来月の売上を予測してくれます。人間が気づかなかったパターンまで発見できるのが強みです。デメリットは、なぜその答えになったかの説明が難しいこと。"
      7: "3つ目が、今いちばん注目されている生成AIです。ChatGPTやClaudeが代表例ですね。これまでのAIは「分類する」「予測する」が中心でしたが、生成AIは「新しく作る」ことができます。文章を書く、画像を作る、プログラムコードを生成する。これが2022年末から爆発的に広がりました。皆さんの業務で言えば、メールの下書き、議事録の要約、企画書のたたき台作成。こういった「ゼロから作る作業」を大幅にスピードアップできるのが生成AIの最大のメリットです。"
      8: "ここで3つの種類を整理しましょう。ルールベースは人間がルールを書く。機械学習はデータからパターンを学ぶ。生成AIはデータから学んで新しいものを作る。それぞれ得意なことが違うので、目的に応じて使い分けることが大切です。"
      9: "では、皆さんの業務ではどう使えるのか。大きく4つの場面があります。1つ目、文書作成。メールの下書き、報告書の要約、外国語の翻訳。2つ目、情報整理。会議の議事録を自動で作ったり、大量のデータを分類したり。3つ目、アイデア出し。企画のブレストやキャッチコピーの案出し。4つ目、調査やリサーチ。市場調査の情報をまとめたり、競合の動きを整理したり。ここで大事なのは、「AIに全部任せる」のではなく、「AIに下書きさせて、人間が確認して仕上げる」という使い方が基本だということです。"
      10: "AIを使い始める前に、3つだけ注意点を押さえてください。1つ目、機密情報を入れないこと。ChatGPTなどの外部サービスに、お客様の個人情報や社内の機密データを入力してはいけません。必ず会社のAI利用ルールを確認してください。2つ目、答えを鵜呑みにしないこと。AIは自信たっぷりに間違えることがあります。これをハルシネーションと言います。AIの出力は必ず人間が確認してから使いましょう。3つ目、著作権に注意すること。AIが作った文章や画像の著作権は、まだ法的にグレーな部分があります。そのまま外部に出す場合は、上長に相談してください。"
      11: "今日のまとめです。AIとは人間の判断をコンピュータにやらせる技術。種類はルールベース、機械学習、生成AIの3つ。業務では下書き、要約、アイデア出し、リサーチに特に有効。そして機密情報を入れない、答えを鵜呑みにしない、著作権に注意する。この4つを覚えておいてください。"
      12: "お疲れさまでした。このあと確認テストがあります。5問中4問正解で修了です。今の内容を思い出しながら挑戦してみてください。"
