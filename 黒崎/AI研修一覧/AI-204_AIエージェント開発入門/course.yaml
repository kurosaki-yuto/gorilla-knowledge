course:
  id: "AI-204"
  title: "AIエージェント開発入門"
  subtitle: "ノーコードで自社エージェントを作る"
  level: "実践"
  target: "全社員"
  duration: "10分"
  category: "AIエージェント"

chapters:
  - id: "AI-204"
    title: "AIエージェント開発入門 — ノーコードで自社エージェントを作る"
    learning_goals:
      - "AIエージェントの作り方の全体像を理解できる"
      - "ノーコード・ローコードツールで作れることを知る"
      - "良いエージェント設計のポイントを押さえる"

    slides:
      - type: "title"
        title: "AIエージェント開発入門"
        subtitle: "ノーコードで自社エージェントを作る"

      - type: "goals"
        title: "今日のゴール"
        items:
          - "AIエージェントの作り方の全体像を理解できる"
          - "ノーコード・ローコードツールで作れることを知る"
          - "良いエージェント設計のポイントを押さえる"

      - type: "definition"
        title: "エージェント開発とは？"
        definition: "AIに「役割」「ツール」「ルール」を設定し、自律的に業務を遂行させること"
        comparison:
          left: { label: "プロンプトだけ", steps: ["毎回指示を書く", "1回きりの回答", "ツール連携なし"] }
          right: { label: "エージェント開発", steps: ["役割とルールを事前設定", "自律的に繰り返し実行", "外部ツールと連携"] }
        footnote: "エージェント開発はプログラミング不要。設定画面で作れるツールが充実している。"

      - type: "cards"
        title: "エージェントの3つの構成要素"
        cards:
          - { icon: "users", label: "ロール（役割）", desc: "AIが演じる専門家の役割を定義", color: "accent" }
          - { icon: "plug", label: "ツール（能力）", desc: "使える外部サービスやAPIを接続", color: "green" }
          - { icon: "shield", label: "ルール（制約）", desc: "やっていいこと・ダメなことを設定", color: "amber" }

      - type: "examples"
        title: "ノーコードで作れるツール"
        number: 1
        subtitle: "プログラミング不要でAIエージェントを構築"
        examples:
          - { label: "ChatGPT GPTs", tools: "OpenAI", desc: "会話形式でカスタムAIを作成。社内知識を学習させられる" }
          - { label: "Claude Projects", tools: "Anthropic", desc: "ファイルや指示を事前設定。チーム共有も可能" }
          - { label: "Dify", tools: "OSS", desc: "ノーコードでAIワークフローを構築。ツール連携も簡単" }
        insight: "IT部門でなくても、誰でもエージェントが作れる時代"

      - type: "examples"
        title: "ローコード・コードで作れるツール"
        number: 2
        subtitle: "より高度なカスタマイズが必要な場合"
        examples:
          - { label: "Copilot Studio", tools: "Microsoft", desc: "GUIで業務フロー構築。M365と深い連携" }
          - { label: "OpenAI Agents SDK", tools: "Python", desc: "エージェントをコードで自由に設計・制御" }
          - { label: "Claude Code", tools: "CLI", desc: "ターミナルからAIに開発全体を任せられる" }
        insight: "より複雑な業務にはローコード/コードベースが有効"

      - type: "examples"
        title: "良いエージェント設計のコツ"
        number: 3
        subtitle: "5つのポイントを押さえれば品質が大きく変わる"
        examples:
          - { label: "1. 役割を明確に", desc: "「あなたは経費精算の専門家です」と具体的に定義" }
          - { label: "2. 範囲を限定", desc: "1エージェント=1業務。欲張らない" }
          - { label: "3. 禁止事項を設定", desc: "「個人情報は外部送信しない」等のルールを明記" }
        pros: "シンプルなエージェントほど安定して動く"

      - type: "grid"
        title: "作ってみよう！簡単エージェント例"
        items:
          - { icon: "envelope", label: "メール返信AI", desc: "メール内容を分析し適切な返信案を作成" }
          - { icon: "file", label: "議事録作成AI", desc: "会議音声を要約し議事録フォーマットに整形" }
          - { icon: "clipboard", label: "FAQボットAI", desc: "社内規程を参照し質問に即時回答" }
          - { icon: "chart", label: "レポート生成AI", desc: "データを集計し定型レポートを自動作成" }
        key_message: "まずは「定型×繰り返し」の業務からエージェント化しよう"

      - type: "table"
        title: "開発ツール比較"
        headers: ["ツール", "難易度", "カスタマイズ性", "おすすめ対象"]
        header_colors: ["offWhite", "accent", "green", "amber"]
        rows:
          - ["ChatGPT GPTs", "とても簡単", "低〜中", "初めてAIを作る人"]
          - ["Dify", "簡単", "中〜高", "ワークフローを組みたい人"]
          - ["Copilot Studio", "普通", "高", "M365環境の企業"]
          - ["Agents SDK", "やや高い", "非常に高", "開発チーム"]

      - type: "caution"
        title: "エージェント開発の注意点"
        items:
          - { icon: "warning", title: "テストを十分に行う", desc: "想定外の入力でどう動くか事前に確認。本番投入前にテスト。", color: "amber" }
          - { icon: "lock", title: "アクセス権限の設計", desc: "エージェントが触れるデータ・システムの範囲を明確に定義。", color: "red" }
          - { icon: "users", title: "運用体制を決める", desc: "誰が管理するか、問題発生時の対応フローを事前に決定。", color: "amber" }

      - type: "summary"
        title: "まとめ"
        items:
          - { label: "構成要素", text: "ロール（役割）+ ツール（能力）+ ルール（制約）", color: "accent" }
          - { label: "開発ツール", text: "GPTs / Dify / Copilot Studio（ノーコード可）", color: "green" }
          - { label: "設計のコツ", text: "役割明確・範囲限定・禁止事項設定", color: "amber" }
          - { label: "注意点", text: "テスト・アクセス権限・運用体制", color: "red" }

      - type: "end"
        test_count: 5
        pass_rate: 80
        next: "次のステップ: 実際にエージェントを作ってみよう！"

    test:
      pass_rate: 80
      questions:
        - question: "AIエージェントの3つの構成要素として正しい組み合わせは？"
          choices:
            - "A. データ・モデル・アルゴリズム"
            - "B. ロール（役割）・ツール（能力）・ルール（制約）"
            - "C. 入力・処理・出力"
            - "D. ハード・ソフト・ネットワーク"
          answer: "B"
          explanation: "エージェントは役割（何の専門家か）、ツール（何ができるか）、ルール（何をしてはいけないか）で構成される。"

        - question: "ノーコードでAIエージェントを作れるツールはどれですか？"
          choices:
            - "A. Python"
            - "B. ChatGPT GPTs"
            - "C. Linux"
            - "D. Excel VBA"
          answer: "B"
          explanation: "ChatGPT GPTsは会話形式でカスタムAIエージェントを作成でき、プログラミング不要。"

        - question: "良いエージェント設計のポイントとして正しいものは？"
          choices:
            - "A. できるだけ多くの機能を1つのエージェントに詰め込む"
            - "B. 役割を明確にし、1エージェント=1業務に限定する"
            - "C. 制約やルールは設定しない方が柔軟に動ける"
            - "D. テストせずにすぐ本番投入する"
          answer: "B"
          explanation: "シンプルなエージェントほど安定して動く。役割明確・範囲限定が鍵。"

        - question: "エージェント開発で最初に作るべき業務の特徴は？"
          choices:
            - "A. 毎回異なる判断が必要な創造的な業務"
            - "B. 定型的で繰り返し発生する業務"
            - "C. 機密情報を大量に扱う業務"
            - "D. 複数部門をまたぐ複雑な業務"
          answer: "B"
          explanation: "まずは定型×繰り返しの業務からエージェント化するのが成功の秘訣。"

        - question: "エージェント開発時にアクセス権限の設計が重要な理由は？"
          choices:
            - "A. エージェントの処理速度を上げるため"
            - "B. エージェントが触れるデータやシステムの範囲を制御するため"
            - "C. AIの学習データを増やすため"
            - "D. 開発コストを下げるため"
          answer: "B"
          explanation: "エージェントが想定外のデータにアクセスすることを防ぐため、権限設計は必須。"

    narrations:
      1: "この動画では、プログラミングなしでAIエージェントを作る方法を10分で解説します。ノーコードツールを使えば、誰でもエージェント開発ができる時代です。"
      2: "今日のゴールは3つ。AIエージェントの作り方の全体像を理解すること、ノーコードやローコードのツールを知ること、良いエージェント設計のポイントを押さえることです。"
      3: "エージェント開発とは、AIに役割、ツール、ルールを設定して、自律的に業務を遂行させることです。プロンプトだけの場合は毎回指示を書いて1回きりの回答をもらうだけ。エージェント開発では役割とルールを事前に設定し、自律的に繰り返し実行でき、外部ツールとも連携できます。プログラミングは不要。設定画面で作れるツールが充実しています。"
      4: "エージェントは3つの要素で構成されます。ロール、つまり役割。AIが演じる専門家の役割を定義します。ツール、つまり能力。使える外部サービスやAPIを接続します。ルール、つまり制約。やっていいことダメなことを設定します。この3つを適切に設定することが成功の鍵です。"
      5: "ノーコードで作れるツールを紹介します。ChatGPT GPTsは会話形式でカスタムAIを作成でき、社内知識を学習させられます。Claude Projectsはファイルや指示を事前設定し、チーム共有も可能。Difyはオープンソースのノーコードツールで、AIワークフローを構築できます。IT部門でなくても、誰でもエージェントが作れる時代になりました。"
      6: "より高度なカスタマイズにはローコードやコードベースのツールがあります。Microsoft Copilot StudioはGUIで業務フローを構築でき、Microsoft 365と深く連携します。OpenAI Agents SDKはPythonでエージェントを自由に設計制御できます。Claude Codeはターミナルからの操作で開発全体をAIに任せられます。"
      7: "良いエージェント設計のコツは3つ。1つ目、役割を明確にすること。あなたは経費精算の専門家です、のように具体的に定義しましょう。2つ目、範囲を限定すること。1つのエージェントに1つの業務。欲張らないのがコツです。3つ目、禁止事項を設定すること。個人情報は外部送信しない、のようなルールを明記しましょう。シンプルなエージェントほど安定して動きます。"
      8: "簡単に作れるエージェントの例を紹介します。メール返信AIはメール内容を分析して適切な返信案を作成。議事録作成AIは会議音声を要約して議事録フォーマットに整形。FAQボットAIは社内規程を参照して質問に即時回答。レポート生成AIはデータを集計して定型レポートを自動作成。まずは定型×繰り返しの業務からエージェント化しましょう。"
      9: "開発ツールを比較すると、ChatGPT GPTsはとても簡単で初めてAIを作る人におすすめ。Difyは簡単でワークフローを組みたい人向け。Copilot Studioは普通の難易度でMicrosoft 365環境の企業に最適。Agents SDKはやや高い難易度ですが開発チームなら非常に高いカスタマイズが可能です。"
      10: "注意点は3つ。テストを十分に行うこと。想定外の入力でどう動くか事前に確認し、本番投入前に必ずテストしてください。アクセス権限の設計。エージェントが触れるデータやシステムの範囲を明確に定義しましょう。運用体制を決めること。誰が管理するか、問題発生時の対応フローを事前に決めておきましょう。"
      11: "まとめです。構成要素はロール、ツール、ルールの3つ。開発ツールはGPTs、Dify、Copilot Studioなどノーコードで作れます。設計のコツは役割明確、範囲限定、禁止事項設定。注意点はテスト、アクセス権限、運用体制です。"
      12: "お疲れさまでした。確認テスト5問中4問正解で修了です。そして次のステップとして、実際にエージェントを作ってみましょう！"
