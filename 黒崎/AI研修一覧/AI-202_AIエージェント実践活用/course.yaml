course:
  id: "AI-202"
  title: "AIエージェント実践活用"
  subtitle: "業務を変えるエージェント活用術"
  level: "実践"
  target: "全社員"
  duration: "10分"
  category: "AIエージェント"

chapters:
  - id: "AI-202"
    title: "AIエージェント実践活用 — 業務を変えるエージェント活用術"
    learning_goals:
      - "AIエージェントの主要なツールと製品を知る"
      - "部門別の活用パターンを理解できる"
      - "自社での導入ステップをイメージできる"

    slides:
      - type: "title"
        title: "AIエージェント実践活用"
        subtitle: "業務を変えるエージェント活用術"

      - type: "goals"
        title: "今日のゴール"
        items:
          - "AIエージェントの主要なツールと製品を知る"
          - "部門別の活用パターンを理解できる"
          - "自社での導入ステップをイメージできる"

      - type: "cards"
        title: "主要なAIエージェント製品"
        cards:
          - { icon: "robot", label: "ChatGPT + GPTs", desc: "カスタムエージェントを誰でも作れる", color: "accent" }
          - { icon: "bolt", label: "Claude MCP", desc: "外部ツールと直結して実行力UP", color: "green" }
          - { icon: "briefcase", label: "Copilot Studio", desc: "MS 365と連携した業務自動化", color: "amber" }

      - type: "examples"
        title: "営業部門の活用"
        number: 1
        subtitle: "見込み客の発掘からフォローアップまで自動化"
        examples:
          - { label: "リード発掘", desc: "Web情報を収集し見込み客リストを自動作成" }
          - { label: "提案書作成", desc: "顧客情報から最適な提案書のたたき台を生成" }
          - { label: "フォローアップ", desc: "商談後のお礼メールを自動生成・送信提案" }
        insight: "営業の「調べる・書く・送る」をエージェントが代行"

      - type: "examples"
        title: "管理部門の活用"
        number: 2
        subtitle: "経費精算・勤怠管理・問い合わせ対応を効率化"
        examples:
          - { label: "経費精算", desc: "領収書画像から金額読取→申請書自動作成" }
          - { label: "社内FAQ", desc: "規程を参照し社員からの質問に即時回答" }
          - { label: "レポート生成", desc: "各システムからデータ集計→月次報告書作成" }
        insight: "定型業務の80%をエージェントに任せられる"

      - type: "examples"
        title: "マーケティング部門の活用"
        number: 3
        subtitle: "コンテンツ制作・分析・配信の自動化"
        examples:
          - { label: "市場調査", desc: "競合情報の収集→トレンド分析レポート作成" }
          - { label: "コンテンツ制作", desc: "ブログ記事・SNS投稿の下書き一括生成" }
          - { label: "効果分析", desc: "GA4データ取得→成果レポート自動生成" }
        insight: "「調査→制作→分析」のサイクルを高速に回せる"

      - type: "examples"
        title: "開発部門の活用"
        number: 4
        subtitle: "コーディング・テスト・ドキュメント作成を支援"
        examples:
          - { label: "コード生成", tools: "GitHub Copilot Agent", desc: "Issue→実装→テスト→PR作成を自動実行" }
          - { label: "コードレビュー", tools: "AI Code Review", desc: "変更点の自動分析→改善提案→セキュリティチェック" }
          - { label: "ドキュメント生成", tools: "Claude Code", desc: "コードからAPI仕様書やREADMEを自動生成" }

      - type: "table"
        title: "部門別 導入効果の目安"
        headers: ["部門", "削減できる作業時間", "主な対象業務"]
        header_colors: ["offWhite", "accent", "green"]
        rows:
          - ["営業", "週5〜10時間", "リサーチ・提案書・メール"]
          - ["管理", "週8〜15時間", "経費精算・FAQ・レポート"]
          - ["マーケ", "週5〜8時間", "調査・制作・分析"]
          - ["開発", "週10〜20時間", "コーディング・レビュー・ドキュメント"]

      - type: "grid"
        title: "導入の3ステップ"
        items:
          - { icon: "search", label: "Step 1: 業務の棚卸し", desc: "繰り返し作業・定型作業をリストアップ" }
          - { icon: "target", label: "Step 2: 小さく始める", desc: "1つの業務でパイロット導入する" }
          - { icon: "chart", label: "Step 3: 効果測定", desc: "時間削減・品質改善を定量的に確認" }
          - { icon: "users", label: "Step 4: 横展開", desc: "成功パターンを他部門に広げる" }
        key_message: "まずは1つの業務で試してみることが大事"

      - type: "caution"
        title: "導入時の注意点"
        items:
          - { icon: "shield", title: "セキュリティポリシーの確認", desc: "社内データをAIに渡す範囲を事前に定める。IT部門と連携。", color: "red" }
          - { icon: "balance", title: "コストの把握", desc: "API利用料は従量課金が多い。予算上限の設定が必要。", color: "amber" }
          - { icon: "eye", title: "品質チェック体制", desc: "エージェントの出力を確認するフローを組み込む。", color: "amber" }

      - type: "summary"
        title: "まとめ"
        items:
          - { label: "主要製品", text: "ChatGPT GPTs / Claude MCP / Copilot Studio", color: "accent" }
          - { label: "活用場面", text: "営業・管理・マーケ・開発の定型業務自動化", color: "green" }
          - { label: "導入方法", text: "棚卸し→パイロット→効果測定→横展開", color: "amber" }
          - { label: "注意点", text: "セキュリティ・コスト・品質チェック体制", color: "red" }

      - type: "end"
        test_count: 5
        pass_rate: 80
        next: "AI-203 マルチエージェントシステム"

    test:
      pass_rate: 80
      questions:
        - question: "Claude MCPの特徴として正しいものはどれですか？"
          choices:
            - "A. テキスト生成に特化したチャットボット"
            - "B. 外部ツールと直結して実行力を高めるプロトコル"
            - "C. 画像生成専用のAIサービス"
            - "D. Microsoft製の業務自動化ツール"
          answer: "B"
          explanation: "MCP（Model Context Protocol）はAIと外部ツールを直結し、エージェントの実行力を大幅に高める仕組み。"

        - question: "AIエージェント導入で最初にすべきことは？"
          choices:
            - "A. 全社一斉に導入する"
            - "B. 最も複雑な業務から始める"
            - "C. 繰り返し作業を棚卸しし、1つの業務でパイロット導入する"
            - "D. エージェントに全権限を与えて自由に動かす"
          answer: "C"
          explanation: "まず業務を棚卸しし、1つの業務で小さく始めて効果を確認するのが成功の鍵。"

        - question: "管理部門でのAIエージェント活用例として最も適切なものは？"
          choices:
            - "A. 競合他社の動向をリサーチする"
            - "B. 領収書画像から金額を読み取り申請書を自動作成する"
            - "C. ソースコードの自動生成を行う"
            - "D. SNS投稿の下書きを一括生成する"
          answer: "B"
          explanation: "経費精算の自動化は管理部門でのAIエージェント活用の代表例。"

        - question: "AIエージェント導入時のコスト面で注意すべきことは？"
          choices:
            - "A. 初期費用が高いので導入は避けるべき"
            - "B. API利用料は従量課金が多いため予算上限の設定が必要"
            - "C. 一度導入すれば追加コストは発生しない"
            - "D. 無料プランで十分なので費用の心配は不要"
          answer: "B"
          explanation: "多くのAIエージェントサービスはAPI従量課金のため、予算管理が重要。"

        - question: "AIエージェントの出力に対する正しい姿勢は？"
          choices:
            - "A. AIの出力はプロが作ったものなのでそのまま使う"
            - "B. エージェントの出力を確認するフローを業務に組み込む"
            - "C. エラーが出ない限り確認は不要"
            - "D. 上司だけが確認すれば十分"
          answer: "B"
          explanation: "エージェントの出力を確認するフローを組み込み、品質チェック体制を整えることが重要。"

    narrations:
      1: "この動画では、AIエージェントを実際の業務でどう活用するか、主要な製品の紹介から部門別の活用パターン、導入ステップまでを10分で解説します。"
      2: "今日のゴールは3つ。AIエージェントの主要なツールと製品を知ること、部門別の活用パターンを理解すること、そして自社での導入ステップをイメージできることです。"
      3: "まず、主要なAIエージェント製品を3つ紹介します。ChatGPTのGPTsは、カスタムエージェントを誰でも簡単に作れるプラットフォームです。ClaudeのMCPは、Model Context Protocolの略で、AIと外部ツールを直結して実行力を大幅に高めます。Microsoft Copilot Studioは、Microsoft 365と連携した業務自動化プラットフォームです。"
      4: "営業部門での活用を見てみましょう。リード発掘では、Web情報を自動収集して見込み客リストを作成。提案書作成では、顧客情報から最適なたたき台を生成。フォローアップでは、商談後のお礼メールを自動で生成してくれます。営業の調べる、書く、送るをエージェントが代行してくれるわけです。"
      5: "管理部門では、経費精算で領収書画像から金額を読み取って申請書を自動作成。社内FAQでは規程を参照して社員からの質問に即時回答。レポート生成では各システムからデータを集計して月次報告書を作成。定型業務の80%をエージェントに任せられる可能性があります。"
      6: "マーケティング部門では、市場調査で競合情報の収集からトレンド分析レポートの作成まで。コンテンツ制作ではブログ記事やSNS投稿の下書きを一括生成。効果分析ではGA4のデータを取得して成果レポートを自動生成。調査、制作、分析のサイクルを高速に回せます。"
      7: "開発部門では、GitHub Copilot AgentがIssueから実装、テスト、PR作成まで自動実行。AIコードレビューで変更点の自動分析と改善提案。Claude Codeでコードからドキュメントを自動生成。開発者の生産性を大幅に向上させます。"
      8: "部門別の導入効果をまとめると、営業は週5〜10時間、管理は週8〜15時間、マーケは週5〜8時間、開発は週10〜20時間の作業時間削減が見込めます。"
      9: "導入は4ステップで進めましょう。まず業務の棚卸しで繰り返し作業をリストアップ。次に1つの業務で小さく始める。効果測定で時間削減や品質改善を確認。そして成功パターンを他部門に横展開。まずは1つの業務で試してみることが大事です。"
      10: "導入時の注意点は3つ。セキュリティポリシーの確認として、社内データをAIに渡す範囲を事前に定めてIT部門と連携。コストの把握として、API利用料は従量課金が多いので予算上限を設定。品質チェック体制として、エージェントの出力を確認するフローを組み込むことです。"
      11: "まとめです。主要製品はChatGPT GPTs、Claude MCP、Copilot Studio。活用場面は営業・管理・マーケ・開発の定型業務自動化。導入方法は棚卸し、パイロット、効果測定、横展開の4ステップ。注意点はセキュリティ、コスト、品質チェック体制です。"
      12: "お疲れさまでした。確認テストに挑戦してみてください。5問中4問正解で修了です。"
