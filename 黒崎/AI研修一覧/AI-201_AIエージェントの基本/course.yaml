course:
  id: "AI-201"
  title: "AIエージェントの基本"
  subtitle: "自律的に動くAIの仕組みを理解する"
  level: "入門"
  target: "全社員"
  duration: "10分"
  category: "AIエージェント"

chapters:
  - id: "AI-201"
    title: "AIエージェントの基本 — 自律的に動くAIの仕組みを理解する"
    learning_goals:
      - "AIエージェントとは何かを説明できる"
      - "従来のAI（チャットボット）との違いを理解できる"
      - "AIエージェントの活用場面をイメージできる"

    slides:
      - type: "title"
        title: "AIエージェントの基本"
        subtitle: "自律的に動くAIの仕組みを理解する"

      - type: "goals"
        title: "今日のゴール"
        items:
          - "AIエージェントとは何かを説明できる"
          - "従来のAI（チャットボット）との違いを理解できる"
          - "AIエージェントの活用場面をイメージできる"

      - type: "definition"
        title: "AIエージェントとは？"
        definition: "自分で考え、判断し、行動まで実行できるAIシステム"
        comparison:
          left: { label: "従来のAI", steps: ["人間が指示を出す", "AIが1回答える", "人間が次の指示を出す"] }
          right: { label: "AIエージェント", steps: ["目標を伝える", "AIが計画を立てる", "AIが自分で実行する"] }
        footnote: "エージェントは「代理人」という意味。人間の代わりに自律的にタスクを進める。"

      - type: "cards"
        title: "AIエージェントの3つの特徴"
        cards:
          - { icon: "brain", label: "自律的に判断", desc: "次に何をすべきか自分で考える", color: "accent" }
          - { icon: "tools", label: "ツールを使える", desc: "検索・計算・ファイル操作が可能", color: "green" }
          - { icon: "sync", label: "繰り返し改善", desc: "結果を見て修正を繰り返す", color: "amber" }

      - type: "examples"
        title: "従来のチャットボットとの違い"
        number: 1
        subtitle: "「1問1答」から「目標達成まで自走」へ進化"
        examples:
          - { label: "チャットボット", input: "「会議室を予約して」", output: "「予約ページはこちらです」（URLを案内するだけ）" }
          - { label: "AIエージェント", input: "「会議室を予約して」", output: "空き状況を確認→最適な部屋を選択→予約完了まで実行" }
        pros: "エージェントは指示1回で完了まで動く"
        cons: "権限設定やセキュリティ管理が必要"

      - type: "examples"
        title: "AIエージェントの動作ループ"
        number: 2
        subtitle: "計画→実行→観察→修正を自動で繰り返す"
        flow: ["目標を理解", "計画を立てる", "ツールで実行", "結果を確認"]
        examples:
          - { label: "計画", desc: "目標を分解して手順を決める" }
          - { label: "実行", desc: "API・検索・ファイル操作などツールを使う" }
          - { label: "修正", desc: "うまくいかなければ別の方法を試す" }
        insight: "人間のPDCAサイクルをAIが高速に自動実行するイメージ"

      - type: "examples"
        title: "身近なAIエージェントの例"
        number: 3
        subtitle: "すでに実用化されているAIエージェント"
        examples:
          - { label: "GitHub Copilot Agent", tools: "コード開発", desc: "Issue→コード生成→テスト→PR作成を自動実行" }
          - { label: "Devin", tools: "ソフトウェア開発", desc: "要件から設計・実装・デバッグまで一貫対応" }
          - { label: "Copilot Studio", tools: "業務自動化", desc: "社内システムと連携し業務フローを自動化" }

      - type: "table"
        title: "従来AI vs AIエージェント"
        headers: ["", "従来のAI", "AIエージェント"]
        header_colors: ["offWhite", "accent", "green"]
        rows:
          - ["動作", "1回の質問に1回回答", "目標達成まで自律的に動く"]
          - ["ツール利用", "テキスト生成のみ", "検索・API・ファイル操作も可能"]
          - ["判断力", "人間が毎回指示", "状況を見て自分で次の行動を決定"]
          - ["代表例", "ChatGPT（通常チャット）", "GitHub Copilot Agent / Devin"]

      - type: "grid"
        title: "業務でどう使える？"
        items:
          - { icon: "envelope", label: "メール対応", desc: "受信→内容判断→返信下書き→送信まで" }
          - { icon: "search", label: "リサーチ", desc: "テーマ設定→情報収集→レポート作成" }
          - { icon: "clipboard", label: "データ処理", desc: "ファイル取得→集計→報告書作成" }
          - { icon: "headset", label: "カスタマー対応", desc: "問合せ→調査→回答→エスカレーション判断" }
        key_message: "AIエージェントは「指示→完了」を1回のやり取りで実現する"

      - type: "caution"
        title: "AIエージェントの注意点"
        items:
          - { icon: "shield", title: "権限管理が重要", desc: "エージェントに与える権限は必要最小限に。何を操作できるか事前に確認。", color: "red" }
          - { icon: "eye", title: "結果の確認は必須", desc: "自律的に動くからこそ、最終成果は人間がレビューする。", color: "amber" }
          - { icon: "lock", title: "機密データに注意", desc: "エージェントがアクセスするデータの範囲を把握しておく。", color: "red" }

      - type: "summary"
        title: "まとめ"
        items:
          - { label: "AIエージェント", text: "自分で判断・ツール利用・改善を繰り返すAI", color: "accent" }
          - { label: "従来との違い", text: "1問1答→目標達成まで自律的に動く", color: "green" }
          - { label: "活用場面", text: "リサーチ・メール対応・データ処理の自動化", color: "amber" }
          - { label: "注意点", text: "権限管理・結果確認・機密データ管理", color: "red" }

      - type: "end"
        test_count: 5
        pass_rate: 80
        next: "AI-202 AIエージェント実践活用"

    test:
      pass_rate: 80
      questions:
        - question: "AIエージェントの最大の特徴はどれですか？"
          choices:
            - "A. テキストを高速に生成できる"
            - "B. 目標に向かって自律的に判断・行動できる"
            - "C. 人間より正確に文章を書ける"
            - "D. インターネットに接続できる"
          answer: "B"
          explanation: "AIエージェントは目標を与えると、自分で計画を立て、ツールを使い、結果を確認しながら目標達成まで動く。"

        - question: "従来のチャットボットとAIエージェントの違いで正しいものは？"
          choices:
            - "A. チャットボットの方が高性能"
            - "B. AIエージェントは1回の指示で複数ステップを自動実行できる"
            - "C. チャットボットもツールを自由に使える"
            - "D. AIエージェントは人間の指示なしで勝手に動き出す"
          answer: "B"
          explanation: "チャットボットは1問1答、エージェントは目標達成まで複数ステップを自律的に実行する。"

        - question: "AIエージェントの動作ループとして正しい順序は？"
          choices:
            - "A. 実行→計画→観察→修正"
            - "B. 計画→実行→観察→修正"
            - "C. 観察→修正→計画→実行"
            - "D. 修正→観察→実行→計画"
          answer: "B"
          explanation: "エージェントは計画→実行→観察→修正のループを繰り返して目標に近づく。"

        - question: "AIエージェントを業務で使う際に最も重要なことは？"
          choices:
            - "A. できるだけ多くの権限を与えて自由に動かす"
            - "B. エージェントの出力は常に正しいのでそのまま使う"
            - "C. 権限を必要最小限にし、最終成果は人間が確認する"
            - "D. エージェントにすべての業務を任せて人間は関与しない"
          answer: "C"
          explanation: "自律的に動くからこそ、権限管理と人間によるレビューが重要。"

        - question: "以下のうち、AIエージェントの活用例として最も適切なものは？"
          choices:
            - "A. 「今日の天気は？」と聞いて回答を得る"
            - "B. 問合せ内容を判断し、調査・回答・必要に応じてエスカレーションまで自動で行う"
            - "C. 決まったテンプレートでメールを自動送信する"
            - "D. ファイルを指定フォルダにコピーする"
          answer: "B"
          explanation: "AIエージェントは複数ステップを自律的に判断・実行できるのが特徴。"

    narrations:
      1: "この動画では、いま注目されている「AIエージェント」とは何か、従来のAIとどう違うのか、そして業務でどう活用できるのかを10分で解説します。"
      2: "今日のゴールは3つです。AIエージェントとは何かを説明できること、従来のチャットボットとの違いを理解すること、そしてAIエージェントの活用場面をイメージできることです。"
      3: "AIエージェントを一言で言うと、自分で考え、判断し、行動まで実行できるAIシステムです。従来のAIは人間が指示を出して、AIが1回答えて、また人間が次の指示を出すという流れでした。一方、AIエージェントは目標を伝えるだけで、AIが自分で計画を立て、自分で実行してくれます。エージェントとは代理人という意味。人間の代わりに自律的にタスクを進めてくれるわけです。"
      4: "AIエージェントには3つの大きな特徴があります。1つ目は自律的に判断すること。次に何をすべきか自分で考えます。2つ目はツールを使えること。ウェブ検索、計算、ファイル操作など、外部のツールと連携して行動できます。3つ目は繰り返し改善すること。結果を見て、うまくいかなければ別の方法を試します。"
      5: "従来のチャットボットとの違いを見てみましょう。たとえば「会議室を予約して」と頼んだとき、チャットボットは予約ページのURLを教えてくれるだけです。一方、AIエージェントは空き状況を確認し、最適な部屋を選び、予約完了まで全部やってくれます。1問1答から、目標達成まで自走するAIに進化したわけです。"
      6: "AIエージェントの動作の仕組みを見てみましょう。目標を理解する、計画を立てる、ツールで実行する、結果を確認する。この4つのステップを自動で繰り返します。人間のPDCAサイクルを、AIが高速に自動実行しているイメージです。うまくいかなければ、自分で別の方法を試してくれます。"
      7: "すでに実用化されているAIエージェントを紹介します。GitHub Copilot Agentは、イシューからコード生成、テスト、プルリクエスト作成まで自動実行します。Devinはソフトウェア開発を一貫して対応できるAIエージェントです。Microsoft Copilot Studioは、社内システムと連携して業務フローを自動化できます。"
      8: "従来のAIとAIエージェントを比較してみましょう。動作は1回の質問に1回回答から、目標達成まで自律的に動くへ。ツール利用はテキスト生成のみから、検索やAPI、ファイル操作も可能へ。判断力は人間が毎回指示から、状況を見て自分で次の行動を決めるへ。大きな進化ですね。"
      9: "では、業務ではどう使えるのか。メール対応では、受信内容を判断して返信下書きから送信まで。リサーチでは、テーマ設定から情報収集、レポート作成まで。データ処理では、ファイル取得から集計、報告書作成まで。カスタマー対応では、問い合わせの調査から回答、必要に応じたエスカレーション判断まで。指示1回で完了まで動いてくれるのがポイントです。"
      10: "AIエージェントを使うときの注意点を3つ覚えてください。1つ目、権限管理が重要。エージェントに与える権限は必要最小限に。何を操作できるか事前に確認しましょう。2つ目、結果の確認は必須。自律的に動くからこそ、最終成果は必ず人間がレビューしてください。3つ目、機密データに注意。エージェントがアクセスするデータの範囲を把握しておきましょう。"
      11: "今日のまとめです。AIエージェントは、自分で判断し、ツールを使い、改善を繰り返すAI。従来のチャットボットとの違いは、1問1答から目標達成まで自律的に動くこと。活用場面はリサーチ、メール対応、データ処理の自動化。そして注意点は権限管理、結果確認、機密データ管理。この4つを覚えておいてください。"
      12: "お疲れさまでした。このあと確認テストがあります。5問中4問正解で修了です。今の内容を思い出しながら挑戦してみてください。"
